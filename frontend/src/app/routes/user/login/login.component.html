<div class="content-border padded">
  <div class="container centered">
    <form class="row" (ngSubmit)="onSubmit()">
      <div class="col-12 py-2">
        <img
          src="/assets/branding/text/picsur_light.svg"
          alt="Picsur Text Logo"
        />
      </div>

      <div class="col-12 py-2">
        <h1>Login to your account</h1>
      </div>

      <ng-container *ngIf="useBuiltinAuth">
        <div class="col-12 py-2">
          <mat-form-field appearance="outline">
            <mat-label>Username</mat-label>
            <input
              matInput
              type="text"
              [formControl]="model.username"
              name="username"
              autocorrect="off"
              autocapitalize="none"
              required
            />
            <mat-error *ngIf="model.username.errors">
              {{ model.usernameError }}
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-12 py-2">
          <mat-form-field appearance="outline">
            <mat-label>Password</mat-label>
            <input
              matInput
              type="password"
              [formControl]="model.password"
              name="password"
              required
            />
            <mat-error *ngIf="model.password.errors">
              {{ model.passwordError }}
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-12 py-2">
          <button
            mat-raised-button
            color="primary"
            class="mx-2"
            type="submit"
            [disabled]="loading"
          >
            {{ loading ? 'LOADING...' : 'LOGIN' }}
          </button>
          <button
            *ngIf="showRegister"
            mat-flat-button
            color="accent"
            class="mx-2"
            (click)="onRegister()"
            type="button"
          >
            REGISTER
          </button>
        </div>
      </ng-container>

      <div class="col-12 py-2" *ngIf="showOidcLogin">
        <hr />
        <button
          mat-stroked-button
          color="primary"
          class="mx-2"
          (click)="onOidcLogin()"
          type="button"
        >
          LOGIN WITH {{ oidcProviderName | uppercase }}
        </button>
        <button
          *ngIf="disableBuiltinAuth"
          mat-button
          color="primary"
          class="mx-2"
          (click)="toggleBuiltinAuth()"
          type="button"
        >
          {{ useBuiltinAuth ? 'USE SSO INSTEAD' : 'USE PASSWORD INSTEAD' }}
        </button>
      </div>
    </form>
  </div>
</div>
